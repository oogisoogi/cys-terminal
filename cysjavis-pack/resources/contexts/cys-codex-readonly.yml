# cys-codex-readonly — codex 리뷰어 전용 Serena context (구조적 read-only)
# 근거: Serena codex.yml(/tmp/serena_research/.../contexts/codex.yml)을 미러하고, 심볼-편집
#       tool 전부를 excluded_tools에 추가한다. codex.yml은 replace_content(line edit)만 제외하고
#       replace_symbol_body/rename_symbol/insert_*/safe_delete_symbol는 미제외 → --context=codex
#       만으론 read-only가 아니다(producer≠evaluator 파괴). 이 context가 capability-layer로 강제.
# 채널: codex mcp add serena-ro -- ... --context <이 파일 절대경로> ... (~/.codex/config.toml; 사람 1회)
# read_only(project.yml)는 공유 repo에 쓸 수 없다(워커가 편집해야 함) → context excluded_tools로 차단.
#       context excluded_tools는 project.yml read_only와 무관히 합집합 적용(둘째 project.yml 불요).
# tool 이름 = snake_case(클래스명 - "Tool" 접미사, tools_base.py get_name_from_cls 실측).
#       SafeDeleteSymbol은 "Tool" 미접미 → safe_delete_symbol(safe_delete 아님 — 실측 교정).
description: |
  cys codex reviewer — structurally read-only Serena. All symbolic-edit and memory-write tools
  are excluded so the reviewer can navigate code (symbolic READ) but cannot mutate the shared repo
  or memory (producer != evaluator). Mirrors Serena's codex context and extends excluded_tools.
prompt: |
  You are the cys codex reviewer running in a structurally read-only Serena context.
  File operations, line-based edits/reads, and shell commands are handled by your own internal tools.
  You may NAVIGATE code with Serena's symbolic READ tools (get_symbols_overview, find_symbol,
  find_referencing_symbols, find_implementations, find_declaration, get_diagnostics_*), which are far
  more token-efficient than reading whole files. You MUST NOT mutate the repository or memory: all
  symbolic-edit tools (replace_symbol_body, rename_symbol, insert_after_symbol, insert_before_symbol,
  safe_delete_symbol) and all memory-write tools are excluded. You are a reviewer, not a producer —
  never propose to apply edits; report findings as a verdict only.
  Avoid reading entire source files unless strictly necessary; prefer overview + symbolic search.

excluded_tools:
  # ── Serena codex.yml 원본 제외(비심볼 편집·셸·기본 파일 도구) ──
  - create_text_file
  - read_file
  - execute_shell_command
  - replace_content
  - find_file
  - list_dir
  # ── cys 확장: 심볼-편집 tool 전부 제외(구조적 read-only 강제) ──
  - replace_symbol_body
  - rename_symbol
  - insert_after_symbol
  - insert_before_symbol
  - safe_delete_symbol
  # ── cys 확장: 메모리-write tool 제외(리뷰어는 cys SOT를 만지지 않음; javis_memory FileLock SOT) ──
  - write_memory
  - delete_memory
  - edit_memory
  - rename_memory
  - onboarding

tool_description_overrides: {}

# 단일 프로젝트(공유 repo)만 — activate_project 비활성, tool 집합 최소화.
single_project: true
