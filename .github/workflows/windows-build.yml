name: windows-build (feasibility)

# ★목적: Windows x64 자기완결 설치파일(cys-terminal + cysjavis 팩 + bash/python 런타임) 빌드·검증.
#   feat/windows-x64-dist 브랜치 push 시 자동 실행 → setup.exe 를 Actions 아티팩트로 업로드.
#   release.yml(태그 트리거·공개 repo 발행)과 완전 독립 — 이 잡은 어떤 릴리스도 만들지 않는다.
#   미서명(프로파일 A). createUpdaterArtifacts=false 라 서명키 불요.

on:
  push:
    branches: ['feat/windows-x64-dist']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (x86_64-pc-windows-msvc = 러너 네이티브)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: windows-x64-feasibility

      - name: 동봉 런타임 준비 (PortableGit + Python embeddable)
        shell: bash
        run: |
          set -euo pipefail
          RT="src-tauri/runtime"
          rm -rf "$RT"; mkdir -p "$RT"
          echo "== PortableGit 2.55.0 (bash + coreutils + git) =="
          curl -fL -o pg.7z.exe "https://github.com/git-for-windows/git/releases/download/v2.55.0.windows.1/PortableGit-2.55.0-64-bit.7z.exe"
          7z x pg.7z.exe -o"$RT/git" -y >/dev/null
          # 안전한 경량화: 문서·매뉴얼만 제거(런타임 기능 무관).
          rm -rf "$RT/git/mingw64/share/doc" "$RT/git/usr/share/doc" \
                 "$RT/git/mingw64/share/man" "$RT/git/usr/share/man" 2>/dev/null || true
          echo "== Python 3.12.10 embeddable (stdlib + _sqlite3 + ssl) =="
          curl -fL -o py.zip "https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip"
          7z x py.zip -o"$RT/python" -y >/dev/null
          cp "$RT/python/python.exe" "$RT/python/python3.exe"
          # embeddable ._pth: 스크립트 dir(.) + site 활성화(형제 import·표준 경로 계산 존중).
          printf 'python312.zip\n.\nimport site\n' > "$RT/python/python312._pth"
          # 라이선스 고지(동봉 재배포 의무).
          mkdir -p "$RT/LICENSES"
          printf 'Bundled runtimes and their licenses:\n- Git for Windows (git): GPLv2 (https://github.com/git-for-windows/git)\n- MSYS2 bash + GNU coreutils: GPLv3\n- CPython (embeddable): PSF License (https://www.python.org)\nWritten offer for corresponding source: contact the distributor.\n' > "$RT/LICENSES/BUNDLED-RUNTIMES.txt"
          echo "== 확인 =="
          ls -la "$RT/git/usr/bin/bash.exe" "$RT/git/cmd/git.exe" "$RT/python/python3.exe"
          du -sh "$RT" "$RT/git" "$RT/python" || true

      - name: Build Windows x64 (Tauri → NSIS setup.exe)
        shell: bash
        env:
          PYTHONUTF8: '1'   # Windows Python 기본 cp1252 stdout에서 한국어 print 크래시 방지
        run: |
          # createUpdaterArtifacts=false 인라인 override — 이 잡은 서명키 없는 가능성 빌드라
          # updater 서명 산출을 끈다(릴리스 경로 release.yml은 windows conf 기본값 true+서명키 사용).
          bunx @tauri-apps/cli@2 build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload NSIS installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cys-windows-x64-nsis
          path: |
            target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: 자기완결 검증 (silent install → 동봉 bash·python3 실행)
        shell: pwsh
        run: |
          $exe = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "setup.exe 없음" }
          Write-Host ("installer: {0}  size={1}MB" -f $exe.FullName, [math]::Round($exe.Length/1MB,1))
          Start-Process -FilePath $exe.FullName -ArgumentList '/S' -Wait
          Start-Sleep -Seconds 6
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inst) { throw "설치 후 cysd.exe 를 LOCALAPPDATA 아래에서 못 찾음" }
          $dir = $inst.Directory.FullName
          $rt = Join-Path $dir 'runtime'
          Write-Host "install dir: $dir"
          Write-Host "== runtime top-level =="; if (Test-Path $rt) { Get-ChildItem $rt | Select-Object -ExpandProperty Name } else { throw "runtime 폴더 없음: $rt" }
          # cysd PATH 주입이 기대하는 정확 경로(구조 보존 시): runtime\git\usr\bin\bash.exe · runtime\python\python3.exe
          $bash = Get-ChildItem -Path $rt -Recurse -Filter bash.exe -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match 'git\\usr\\bin\\bash\.exe$' } | Select-Object -First 1
          if (-not $bash) { $bash = Get-ChildItem -Path $rt -Recurse -Filter bash.exe -ErrorAction SilentlyContinue | Select-Object -First 1 }
          $py = Get-ChildItem -Path $rt -Recurse -Filter python3.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          Write-Host "bash: $($bash.FullName)"
          Write-Host "python3: $($py.FullName)"
          if (-not $bash) { throw "동봉 bash.exe 를 runtime 아래에서 못 찾음" }
          if (-not $py)   { throw "동봉 python3.exe 를 runtime 아래에서 못 찾음" }
          # cysd 하드코딩 경로와 실제 구조 일치 확인(불일치 시 명시 실패 → cysd PATH 주입도 교정 필요).
          if ($bash.FullName -notmatch 'runtime\\git\\usr\\bin\\bash\.exe$') { throw "bash 경로가 cysd 기대(runtime\git\usr\bin)와 불일치: $($bash.FullName)" }
          if ($py.FullName   -notmatch 'runtime\\python\\python3\.exe$')     { throw "python3 경로가 cysd 기대(runtime\python)와 불일치: $($py.FullName)" }
          & $bash.FullName --version
          & $py.FullName --version
          & $py.FullName -c "import sqlite3, ssl, json, hashlib, urllib.request, ast; print('embeddable stdlib OK (sqlite3+ssl+json+hashlib+urllib+ast)')"
          if ($LASTEXITCODE -ne 0) { throw "동봉 python3 stdlib import 실패" }
          Write-Host "OK: 자기완결 런타임 설치·실행·경로일치 검증 통과"

      - name: PTY 스모크 (검은 pane 회귀 게이트 — ConPTY 셸 출력·실행 실측)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inst) { throw "설치된 cysd.exe 미발견" }
          $dir = $inst.Directory.FullName
          $cys = Join-Path $dir 'cys.exe'
          # list가 형제 cysd를 자동 기동(4초 대기 내장) — ping은 순수 프로브라 autostart가
          # 의도적으로 꺼져 있어(cys.rs) 부트스트랩에 못 쓴다. 첫 시도 실패 시 1회 재시도.
          & $cys list; if ($LASTEXITCODE -ne 0) { Start-Sleep -Seconds 3; & $cys list }
          if ($LASTEXITCODE -ne 0) { throw "cysd 기동 실패 (named pipe 미응답)" }
          $ref = (& $cys new-surface --title pty-smoke | Select-Object -Last 1).Trim()
          if (-not $ref) { throw "new-surface 실패" }
          Write-Host "surface: $ref"
          # ① 셸 프롬프트 도달 실측 — 검은 pane 회귀 시 여기서 실패한다.
          #    (ConPTY 자식이 pseudoconsole에 못 붙으면 출력이 PTY에 영영 도달하지 않는다.)
          $deadline = (Get-Date).AddSeconds(60); $screen = ''
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 3
            $screen = (& $cys read-screen --surface $ref) -join "`n"
            if ($screen -match 'PS ') { break }
          }
          Write-Host "== screen(prompt) =="; Write-Host $screen
          if ($screen -notmatch '\S') { throw "PTY 출력 0바이트 — 검은 pane 회귀 (셸 출력이 pseudoconsole에 도달하지 않음)" }
          if ($screen -notmatch 'PS ') { throw "PowerShell 프롬프트 미검출 — 셸이 pseudoconsole에 붙지 않았거나 즉시 종료" }
          # ② 입력→실행→출력 왕복 실측 — 문자열 연결 결과는 셸이 실제 평가해야만 화면에 나타난다
          #    (타이핑 에코만으로는 'cys-exec-proof' 원문이 등장하지 않게 조합).
          & $cys send --surface $ref "echo ('cys-exec-' + 'proof')"
          & $cys send-key --surface $ref Return
          $deadline = (Get-Date).AddSeconds(40); $ok = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 3
            $screen = (& $cys read-screen --surface $ref) -join "`n"
            if ($screen -match 'cys-exec-proof') { $ok = $true; break }
          }
          if (-not $ok) { Write-Host "== screen(roundtrip) =="; Write-Host $screen; throw "실행 왕복 실패 — PTY 입력 또는 셸 실행 경로 결함" }
          Write-Host "OK: ConPTY 프롬프트·실행 왕복 실측 통과"
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

      # ─────────────────────────────────────────────────────────────────────────
      # T3 기능 스모크 (WINFIX_T3_SMOKE_PLAN.md · row별 PASS/FAIL). release 무관.
      # 행별 결과를 "T3-N RESULT: PASS|FAIL" 로 stdout에 남긴다(매트릭스 승격 판독원). 크리티컬 행만 throw.
      # ─────────────────────────────────────────────────────────────────────────
      - name: T3 기능 스모크 (온보딩·hook·env주입·부서·python3)
        shell: pwsh
        run: |
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inst) { throw "설치된 cysd.exe 미발견" }
          $dir = $inst.Directory.FullName
          $cys = Join-Path $dir 'cys.exe'
          $results = @{}
          function Rec($id,$ok,$note){ $results[$id] = $ok; Write-Host ("T3-{0} RESULT: {1}  {2}" -f $id, ($(if($ok){'PASS'}else{'FAIL'})), $note) }
          $home = $env:USERPROFILE

          # ── T3-1/T3-2: 온보딩(init-pack) + hook 등록·내용(RC-1·RC-2) ──
          try {
            & $cys init-pack 2>&1 | Out-Host
            $packOk = Test-Path (Join-Path $home '.cys\pack\agents.json')
            # hook: ~/.cys/claude/settings.json 또는 ~/.claude*/settings.json 중 SessionStart command 확인
            $settings = @(Get-ChildItem (Join-Path $home '.cys\claude\settings.json'),(Join-Path $home '.claude\settings.json') -ErrorAction SilentlyContinue)
            $hookCmd = ''
            foreach ($s in $settings) { try { $j=Get-Content $s.FullName -Raw|ConvertFrom-Json; $c=$j.hooks.SessionStart.hooks.command; if($c){$hookCmd="$c"} } catch {} }
            Rec 1 ($packOk) "pack=$packOk"
            # RC-2: hook command가 bash로(sh 아님)·경로 quote 시작
            Rec 2 ($hookCmd -match '^bash "') "hookCmd=$hookCmd"
          } catch { Rec 1 $false "$_"; Rec 2 $false "$_" }

          # ── T3-1(autostart) daemon install → schtasks 등록(RC-1) ──
          try { & $cys daemon install 2>&1 | Out-Host; $q = (schtasks /Query /TN cysd 2>&1); Rec '1b' ($LASTEXITCODE -eq 0) "schtasks cysd" } catch { Rec '1b' $false "$_" }

          # ── 데몬 기동(named pipe 바인드·RC-4 기본) ──
          & $cys list 2>&1 | Out-Null; if ($LASTEXITCODE -ne 0) { Start-Sleep 3; & $cys list 2>&1 | Out-Null }
          Rec 'pipe' ($LASTEXITCODE -eq 0) "named pipe \\.\pipe\cys bind"

          # ── T3-13: python3 해소(RC-12) — 동봉 runtime python3.exe 실재+실행 ──
          try { $py = Join-Path $dir 'runtime\python\python3.exe'; & $py -c "print('PYOK')" | Out-Host; Rec 13 ($LASTEXITCODE -eq 0 -and (Test-Path $py)) "python3=$py" } catch { Rec 13 $false "$_" }

          # ── T3-3/T3-4(env주입 메커니즘·스텁): claude 실로그인 불가 → 스텁 에이전트로 env 주입만 검증 ──
          # 설치된 agents.json에 stub 에이전트 추가(JSON 쓰기는 bundled python3로 견고하게). 스텁 cmd는
          # powershell이 CLAUDE_CONFIG_DIR을 echo + prompt=STUBREADY>(ready_marker). env 맵의
          # ${CYS_ACCOUNT_DIR:-ENVINJECT_OK}는 CYS_ACCOUNT_DIR 미설정→"ENVINJECT_OK"로 해소·pane env 주입.
          try {
            $py = Join-Path $dir 'runtime\python\python3.exe'
            $aj = Join-Path $home '.cys\pack\agents.json'
            # 한 줄 python(-c) — YAML/pwsh here-string 충돌 회피(닫는 @'는 column0 필요). pwsh 단일따옴표라
            # 내부 \" 는 python에 그대로 전달(escaped double-quote). python 내 single-quote 없음(안전).
            $pyprog = 'import json,sys; aj=sys.argv[1]; d=json.load(open(aj,encoding="utf-8")); d["stubenv"]={"cmd":"Write-Host CCDPROOF=$env:CLAUDE_CONFIG_DIR","env":{"CLAUDE_CONFIG_DIR":"${CYS_ACCOUNT_DIR:-ENVINJECT_OK}"},"inject_delay_secs":3,"ready_marker":"CCDPROOF=","clear_cmd":"/clear"}; json.dump(d,open(aj,"w",encoding="utf-8"),ensure_ascii=False,indent=2); print("stubenv OK")'
            & $py -c $pyprog $aj | Out-Host
            & $cys launch-agent --role worker --agent stubenv 2>&1 | Out-Host
            # env 주입 증거(견고): launch-agent가 세운 worker pane(env_injected)에 fresh probe를 보내
            # 출력을 읽는다(디렉티브 주입 스크롤백 회피). CI pwsh 단일따옴표라 $env:는 리터럴 전송→pane 확장.
            & $cys send --to worker 'Write-Host CCDFRESH=$env:CLAUDE_CONFIG_DIR' 2>&1 | Out-Null
            & $cys send-key --to worker Return 2>&1 | Out-Null
            $envProof = $false; $scr=''
            $deadline=(Get-Date).AddSeconds(45)
            while((Get-Date) -lt $deadline){ Start-Sleep 3; $scr=(& $cys read-screen --to worker 2>&1) -join "`n"; if($scr -match 'CCDFRESH=ENVINJECT_OK'){$envProof=$true;break} }
            if (-not $envProof) { Write-Host "== stub screen =="; Write-Host $scr }
            Rec 3 $envProof "env주입 스텁 CCDFRESH=ENVINJECT_OK (해소+주입 E2E · claude 실발동은 박사님 실기 마커)"
          } catch { Rec 3 $false "$_" }

          # ── T3-7/T3-9/T3-10/T3-6: 부서 스폰·격리(RC-5/6/15/13·단일부서만·RC-13 후) ──
          try {
            $bash = Join-Path $dir 'runtime\git\usr\bin\bash.exe'
            $deptTool = Join-Path $home '.cys\pack\bin\cys-dept'
            $env:PATH = "$dir;$(Join-Path $dir 'runtime\git\usr\bin');$(Join-Path $dir 'runtime\python');$env:PATH"
            $out = & $bash $deptTool allocate 2>&1; Write-Host "cys-dept allocate: $out"
            $name = ($out | Select-Object -Last 1).Trim()
            $deptOk = $name -match '^dept-\d+$'
            # RC-15: dept_logdir = %LOCALAPPDATA%\cys\cys-dept-<name> 생성·cysd.log
            $logdir = Join-Path $env:LOCALAPPDATA "cys\cys-dept-$name"
            Start-Sleep 3
            $logOk = Test-Path (Join-Path $logdir 'cysd.log')
            Rec 7 $deptOk "cys-dept allocate → $name"
            Rec 10 $logOk "dept_logdir cysd.log @ $logdir"
            if ($deptOk) { & $bash $deptTool down $name 2>&1 | Out-Host }
          } catch { Rec 7 $false "$_"; Rec 10 $false "$_" }

          # ── 집계 + 크리티컬 게이트 ──
          Write-Host "== T3 SMOKE 집계 =="
          $results.GetEnumerator() | Sort-Object Name | ForEach-Object { Write-Host ("  T3-{0}: {1}" -f $_.Key, ($(if($_.Value){'PASS'}else{'FAIL'}))) }
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          # 크리티컬(온보딩·hook·pipe·python3)만 hard gate — 나머지는 로그로 승격 판독.
          $crit = @('1','2','1b','pipe','13')
          $failed = $crit | Where-Object { -not $results[$_] }
          if ($failed) { throw ("크리티컬 T3 행 실패: " + ($failed -join ',')) }
          Write-Host "OK: T3 크리티컬 스모크 통과 (나머지 행은 집계 로그로 승격 판독)"
